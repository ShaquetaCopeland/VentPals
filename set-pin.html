<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Your Secret Code – VentPals</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --primary:#A259FF;
      --secondary:#7ED957;
      --accent:#C9A7FF;
      --text-dark:#2E1A47;
      --ink:#1F2937;
      --muted:#6B7280;
      --ring: rgba(162, 89, 255, 0.25);
    }
    body {
      font-family:'Poppins', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #f5e6ff 0%, #fff8d6 50%, #e0f4ff 100%);
      min-height: 100vh;
      color: var(--ink);
      display:flex;
      flex-direction:column;
    }
    a:focus-visible, button:focus-visible, input:focus-visible {
      outline: 3px solid var(--ring);
      outline-offset: 3px;
      border-radius: 12px;
    }

    header {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(17,24,39,0.06);
    }
    .container { max-width: 980px; margin: 0 auto; padding: 0 18px; width:100%; }
    .nav {
      display:flex; align-items:center; justify-content:space-between;
      padding: 16px 0; gap: 12px;
    }
    .brand {
      display:flex; align-items:center; gap:10px;
      text-decoration:none;
      color: var(--primary);
      font-weight: 800;
      letter-spacing:-0.02em;
    }
    .brand .mark { font-size: 24px; }

    main { flex:1; display:flex; align-items:center; justify-content:center; padding: 34px 18px; }

    .card {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(17,24,39,0.08);
      border-radius: 26px;
      box-shadow: 0 18px 48px rgba(17,24,39,0.10);
      overflow:hidden;
    }
    .card-head {
      padding: 28px 26px 0;
      text-align:center;
    }
    .icon {
      font-size: 56px;
      margin-bottom: 10px;
      animation: floaty 4s ease-in-out infinite;
    }
    @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

    h1 {
      color: var(--primary);
      font-size: 1.7rem;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      font-weight: 800;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 18px;
    }

    form { padding: 8px 26px 26px; display:flex; flex-direction:column; gap: 14px; }

    label {
      display:block;
      font-weight: 700;
      font-size: 13px;
      color: var(--text-dark);
      margin-bottom: 6px;
    }
    .pin-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .pin-digit {
      width: 56px;
      height: 64px;
      border-radius: 14px;
      border: 2px solid rgba(17,24,39,0.12);
      background: #fff;
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      color: var(--text-dark);
      caret-color: var(--primary);
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    .pin-digit::-webkit-outer-spin-button,
    .pin-digit::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .pin-digit:focus {
      outline:none;
      border-color: rgba(139,92,246,0.55);
      box-shadow: 0 0 0 4px rgba(139,92,246,0.12);
    }
    .hint { color: var(--muted); font-size: 12px; margin-top: 6px; text-align: center; }

    .alert {
      display:none;
      border-radius: 16px;
      padding: 12px 12px;
      font-size: 13px;
      border: 1px solid rgba(239,68,68,0.25);
      background: rgba(239,68,68,0.08);
      color: #991B1B;
    }
    .alert.show { display:block; }

    .btn {
      width:100%;
      display:inline-flex; align-items:center; justify-content:center;
      gap:10px;
      padding: 13px 16px;
      border-radius: 999px;
      border: 2px solid transparent;
      font-weight: 800;
      cursor:pointer;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color:#fff;
      box-shadow: 0 14px 28px rgba(162,89,255,0.18);
      transition: transform .15s ease, box-shadow .2s ease;
      font-size: 14px;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 18px 34px rgba(162,89,255,0.24); }

    footer {
      padding: 18px 0 26px;
      text-align:center;
      color: rgba(31,41,55,0.65);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="nav">
        <a class="brand" href="index.html" aria-label="VentPals home">
          <span class="mark" aria-hidden="true">🐦</span>
          <span>VentPals</span>
        </a>
      </div>
    </div>
  </header>

  <main>
    <section class="card" aria-label="Set your secret code">
      <div class="card-head">
        <div class="icon" aria-hidden="true">🔑</div>
        <h1>Create Your Secret Code</h1>
        <p class="subtitle">Pick a 4-digit secret code you can remember. You'll use it to log back in!</p>
      </div>

      <form id="pinForm">
        <div id="errorBox" class="alert" role="alert"></div>

        <div>
          <label>Choose a 4-digit code</label>
          <div class="pin-row" id="pinRow1">
            <input class="pin-digit" type="number" min="0" max="9" maxlength="1" inputmode="numeric" autocomplete="off" aria-label="PIN digit 1" />
            <input class="pin-digit" type="number" min="0" max="9" maxlength="1" inputmode="numeric" autocomplete="off" aria-label="PIN digit 2" />
            <input class="pin-digit" type="number" min="0" max="9" maxlength="1" inputmode="numeric" autocomplete="off" aria-label="PIN digit 3" />
            <input class="pin-digit" type="number" min="0" max="9" maxlength="1" inputmode="numeric" autocomplete="off" aria-label="PIN digit 4" />
          </div>
          <div class="hint">Use any 4 numbers, like 1-2-3-4 or your lucky numbers.</div>
        </div>

        <div>
          <label>Enter it again to make sure</label>
          <div class="pin-row" id="pinRow2">
            <input class="pin-digit" type="number" min="0" max="9" maxlength="1" inputmode="numeric" autocomplete="off" aria-label="Confirm PIN digit 1" />
            <input class="pin-digit" type="number" min="0" max="9" maxlength="1" inputmode="numeric" autocomplete="off" aria-label="Confirm PIN digit 2" />
            <input class="pin-digit" type="number" min="0" max="9" maxlength="1" inputmode="numeric" autocomplete="off" aria-label="Confirm PIN digit 3" />
            <input class="pin-digit" type="number" min="0" max="9" maxlength="1" inputmode="numeric" autocomplete="off" aria-label="Confirm PIN digit 4" />
          </div>
        </div>

        <button class="btn" type="submit">Save My Secret Code 🔐</button>
      </form>
    </section>
  </main>

  <footer>
    VentPals &bull; The Journey of Growing Up.
  </footer>

  <script>
    // Ensure user is logged in before setting PIN
    if (localStorage.getItem('ventpals_logged_in') !== 'true') {
      window.location.replace('login.html');
    }

    function showError(msg) {
      var box = document.getElementById('errorBox');
      box.textContent = msg;
      box.classList.add('show');
    }

    function clearError() {
      document.getElementById('errorBox').classList.remove('show');
    }

    // Auto-advance between PIN digit boxes
    function wirePinRow(rowId) {
      var digits = document.getElementById(rowId).querySelectorAll('.pin-digit');
      digits.forEach(function (input, idx) {
        input.addEventListener('input', function () {
          // Keep only the last typed character
          var val = input.value.replace(/[^0-9]/g, '');
          input.value = val ? val[val.length - 1] : '';
          if (val && idx < digits.length - 1) {
            digits[idx + 1].focus();
          }
        });
        input.addEventListener('keydown', function (e) {
          if (e.key === 'Backspace' && !input.value && idx > 0) {
            digits[idx - 1].focus();
          }
        });
        // Prevent non-numeric input
        input.addEventListener('keypress', function (e) {
          if (!/[0-9]/.test(e.key)) e.preventDefault();
        });
      });
    }

    wirePinRow('pinRow1');
    wirePinRow('pinRow2');

    function getPin(rowId) {
      return Array.from(document.getElementById(rowId).querySelectorAll('.pin-digit'))
        .map(function (d) { return d.value; })
        .join('');
    }

    document.getElementById('pinForm').addEventListener('submit', function (e) {
      e.preventDefault();
      clearError();

      var pin1 = getPin('pinRow1');
      var pin2 = getPin('pinRow2');

      if (pin1.length !== 4) {
        showError('Please enter all 4 digits for your secret code.');
        return;
      }
      if (pin1 !== pin2) {
        showError('The two codes don\'t match. Try again!');
        return;
      }

      // Store encoded PIN (btoa is acceptable for this static demo)
      localStorage.setItem('ventpals_pin_hash', btoa(pin1));

      // Also update the user object to record pin is set
      try {
        var user = JSON.parse(localStorage.getItem('ventpals_user') || '{}');
        user.hasPin = true;
        localStorage.setItem('ventpals_user', JSON.stringify(user));
      } catch (err) {}

      // Redirect to last page or app-switcher
      var lastUrl = localStorage.getItem('ventpals_last_url');
      var allowed = lastUrl && lastUrl.indexOf('login') === -1 && lastUrl.indexOf('signup') === -1 && lastUrl.indexOf('set-pin') === -1;
      window.location.href = allowed ? lastUrl : 'app-switcher.html';
    });
  </script>
</body>
</html>
