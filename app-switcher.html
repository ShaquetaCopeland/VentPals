<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VentPals</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', system-ui, sans-serif;
      background: linear-gradient(135deg, #f5e6ff 0%, #fff8d6 50%, #e0f4ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #5B4B8A;
    }
    .bird { font-size: 52px; animation: floaty 1.2s ease-in-out infinite; }
    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    p { font-size: 14px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="bird">🐦</div>
  <p>Getting your VentPals ready…</p>

  <script>
    const loggedIn = localStorage.getItem('ventpals_logged_in') === 'true';
    const onboardingDone = localStorage.getItem('ventpals_onboarding_complete') === 'true';

    if (!loggedIn) {
      window.location.replace('login.html');
    } else if (!onboardingDone) {
      window.location.replace('onboarding/onboarding.html');
    } else {
      window.location.replace('dashboard.html');
    }
  </script>
</body>
</html>
