<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In – VentPals</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --primary:#A259FF;
      --secondary:#7ED957;
      --accent:#C9A7FF;
      --text-dark:#2E1A47;
      --ink:#1F2937;
      --muted:#6B7280;
      --ring: rgba(162, 89, 255, 0.25);
    }
    body {
      font-family:'Poppins', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #f5e6ff 0%, #fff8d6 50%, #e0f4ff 100%);
      min-height: 100vh;
      color: var(--ink);
      display:flex;
      flex-direction:column;
    }
    a:focus-visible, button:focus-visible, input:focus-visible {
      outline: 3px solid var(--ring);
      outline-offset: 3px;
      border-radius: 12px;
    }

    header {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(17,24,39,0.06);
    }
    .container { max-width: 980px; margin: 0 auto; padding: 0 18px; width:100%; }
    .nav {
      display:flex; align-items:center; justify-content:space-between;
      padding: 16px 0; gap: 12px;
    }
    .brand {
      display:flex; align-items:center; gap:10px;
      text-decoration:none;
      color: var(--primary);
      font-weight: 800;
      letter-spacing:-0.02em;
    }
    .brand .mark { font-size: 24px; }
    .nav a.back {
      color: var(--primary);
      text-decoration:none;
      font-weight:700;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 999px;
    }
    .nav a.back:hover { background: rgba(139,92,246,0.10); }

    main { flex:1; display:flex; align-items:center; justify-content:center; padding: 34px 18px; }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(17,24,39,0.08);
      border-radius: 26px;
      box-shadow: 0 18px 48px rgba(17,24,39,0.10);
      overflow:hidden;
    }
    .card-head {
      padding: 28px 26px 0;
      text-align:center;
    }
    .icon {
      font-size: 56px;
      margin-bottom: 10px;
      animation: floaty 4s ease-in-out infinite;
    }
    @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

    h1 {
      color: var(--primary);
      font-size: 1.7rem;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      font-weight: 800;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 18px;
    }

    form { padding: 8px 26px 26px; display:flex; flex-direction:column; gap: 14px; }

    label {
      display:block;
      font-weight: 700;
      font-size: 13px;
      color: var(--text-dark);
      margin-bottom: 6px;
    }
    input {
      width:100%;
      padding: 12px 12px;
      border-radius: 14px;
      border: 2px solid rgba(17,24,39,0.12);
      background: #fff;
      font-size: 14px;
    }
    input:focus {
      outline:none;
      border-color: rgba(139,92,246,0.55);
      box-shadow: 0 0 0 4px rgba(139,92,246,0.12);
    }

    .alert {
      display:none;
      border-radius: 16px;
      padding: 12px 12px;
      font-size: 13px;
      border: 1px solid rgba(239,68,68,0.25);
      background: rgba(239,68,68,0.08);
      color: #991B1B;
    }
    .alert.show { display:block; }

    .btn {
      width:100%;
      display:inline-flex; align-items:center; justify-content:center;
      gap:10px;
      padding: 13px 16px;
      border-radius: 999px;
      border: 2px solid transparent;
      font-weight: 800;
      cursor:pointer;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color:#fff;
      box-shadow: 0 14px 28px rgba(162,89,255,0.18);
      transition: transform .15s ease, box-shadow .2s ease;
      font-size: 14px;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 18px 34px rgba(162,89,255,0.24); }

    .foot {
      padding: 16px 26px 22px;
      border-top: 1px solid rgba(17,24,39,0.06);
      text-align:center;
      color: var(--muted);
      font-size: 13px;
    }
    .foot a { color: var(--primary); font-weight: 800; text-decoration:none; }
    .foot a:hover { text-decoration: underline; }

    footer {
      padding: 18px 0 26px;
      text-align:center;
      color: rgba(31,41,55,0.65);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="nav">
        <a class="brand" href="index.html" aria-label="VentPals home">
          <span class="mark" aria-hidden="true">🐦</span>
          <span>VentPals</span>
        </a>
        <a class="back" href="index.html">← Back</a>
      </div>
    </div>
  </header>

  <main>
    <section class="card" aria-label="Log in">
      <div class="card-head">
        <div class="icon" aria-hidden="true">🔐</div>
        <h1>Welcome back</h1>
        <p class="subtitle">Log in to continue your journey with your VentPal.</p>
      </div>

      <form id="loginForm">
        <div id="errorBox" class="alert" role="alert"></div>

        <div>
          <label for="identifier">Email or username</label>
          <input id="identifier" name="identifier" type="text" autocomplete="username" placeholder="you@example.com or StarKid" required />
        </div>

        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>

        <button class="btn" type="submit">Log in</button>
      </form>

      <div class="foot">
        New here? <a href="signup.html">Create an account</a>
        <div style="margin-top:10px; font-size:12px;">
          For grown‑ups managing accounts, go to <a href="adult-login.html">Adult Login</a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    VentPals • The Journey of Growing Up.
  </footer>

  <script>
    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.classList.add('show');
    }

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();

      const identifier = document.getElementById('identifier').value.trim();
      const password = document.getElementById('password').value;

      const storedUser = localStorage.getItem('ventpals_user');
      const storedPw = localStorage.getItem('ventpals_password_hash');

      if (!storedUser || !storedPw) {
        showError('No account found on this device yet. Please sign up first.');
        return;
      }

      const user = JSON.parse(storedUser);
      const correctPw = atob(storedPw);

      const idMatch = (identifier.toLowerCase() === String(user.email || '').toLowerCase()) ||
                      (identifier.toLowerCase() === String(user.username || '').toLowerCase());

      if (!idMatch || password !== correctPw) {
        showError('Invalid email/username or password. Please try again.');
        return;
      }

      localStorage.setItem('ventpals_logged_in', 'true');
      window.location.href = 'app-switcher.html';
    });
  </script>
</body>
</html>
