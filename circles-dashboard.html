<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Nests – VentPals</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom right, #f0f9ff, #F7F4FF);
    }
    .float {
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .nest-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .nest-card:hover {
      transform: translateY(-3px);
    }
    .my-nest-badge {
      display: none;
      background: #7c3aed;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: 8px;
      vertical-align: middle;
    }
  </style>
</head>

<body class="text-gray-800">
  <script>if(localStorage.getItem('ventpals_logged_in')!=='true'){window.location.replace('login.html');}</script>
  <script src="assets/js/session.js"></script>

  <!-- NAV -->
  <nav class="bg-white/70 backdrop-blur-md shadow-sm sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="dashboard.html" class="flex items-center gap-2">
        <img src="assets/images/logo.png" class="h-8" alt="VentPals Logo">
        <span class="font-bold text-lg text-purple-700">VentPals</span>
      </a>

      <button class="sm:hidden text-purple-700 text-2xl" id="menuToggle">☰</button>

      <ul id="mobileMenu"
          class="hidden sm:flex flex-col sm:flex-row gap-4 text-sm font-semibold text-purple-700 sm:static absolute right-4 top-14 bg-white/90 sm:bg-transparent p-4 sm:p-0 rounded-xl shadow sm:shadow-none">
        <li><a href="profile.html" class="hover:text-purple-900">Profile</a></li>
        <li><a href="settings.html" class="hover:text-purple-900">Settings</a></li>
      </ul>
    </div>
  </nav>

  <script>
    document.getElementById('menuToggle').onclick = () => {
      document.getElementById('mobileMenu').classList.toggle('hidden');
    };
  </script>

  <!-- HEADER -->
  <section class="text-center py-10 px-6">
    <div class="text-6xl float mb-4">🪺</div>
    <h1 class="text-3xl font-bold text-purple-700 mb-2">The Flock's Nests</h1>
    <p class="text-gray-600 text-sm max-w-xl mx-auto">
      Every bird has a Nest — a safe space where kids can learn, share feelings, and grow.
      Visit any bird's Nest, or go to yours to write, reflect, and feel supported.
    </p>
  </section>

  <!-- ALL NESTS GRID -->
  <section class="max-w-4xl mx-auto px-6 pb-20">

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="nestsGrid">
      <!-- Populated by script below -->
    </div>

    <!-- BACK -->
    <div class="text-center mt-10">
      <a href="dashboard.html"
         class="inline-block text-purple-600 hover:text-purple-800 font-semibold text-sm">
        ← Back to Dashboard
      </a>
    </div>

  </section>

  <!-- FOOTER -->
  <footer class="py-6 text-center text-gray-500 text-xs">
    VentPals • The Journey of Growing Up.
  </footer>

  <script>
    const BIRDS = [
      { id:'aura',     name:'Aura',     emoji:'🕊️',  trait:'Calm &amp; Gentle',         page:'aura-nest.html' },
      { id:'breezy',   name:'Breezy',   emoji:'🍃',  trait:'Thoughtful &amp; Quiet',    page:'breezy-nest.html' },
      { id:'clover',   name:'Clover',   emoji:'🍀',  trait:'Safe &amp; Grounded',       page:'clover-nest.html' },
      { id:'cove',     name:'Cove',     emoji:'🌊',  trait:'Shelter &amp; Comfort',     page:'cove-nest.html' },
      { id:'drift',    name:'Drift',    emoji:'🌙',  trait:'Reflective',                page:'drift-nest.html' },
      { id:'echo',     name:'Echo',     emoji:'🔔',  trait:'Validation',                page:'echo-nest.html' },
      { id:'flamez',   name:'Flamez',   emoji:'🔥',  trait:'Bold &amp; Expressive',     page:'flamez-nest.html' },
      { id:'flare',    name:'Flare',    emoji:'⚡',  trait:'Motivated &amp; Brave',     page:'flare-nest.html' },
      { id:'flicker',  name:'Flicker',  emoji:'💫',  trait:'Hopeful &amp; Curious',     page:'flicker-nest.html' },
      { id:'guardian', name:'Guardian', emoji:'🛡️',  trait:'Protective',                page:'guardian-nest.html' },
      { id:'lumen',    name:'Lumen',    emoji:'💡',  trait:'Insight &amp; Clarity',     page:'lumen-nest.html' },
      { id:'nova',     name:'Nova',     emoji:'🌟',  trait:'Perspective &amp; Growth',  page:'nova-nest.html' },
      { id:'pebble',   name:'Pebble',   emoji:'🪨',  trait:'Gentle Guidance',           page:'pebble-nest.html' },
      { id:'sable',    name:'Sable',    emoji:'⭐',  trait:'Resilience &amp; Strength', page:'sable-nest.html' },
      { id:'solace',   name:'Solace',   emoji:'🌿',  trait:'Comfort &amp; Soothing',    page:'solace-nest.html' },
      { id:'twig',     name:'Twig',     emoji:'🌱',  trait:'Early Growth',              page:'twig-nest.html' },
    ];

    // Get user's own bird id from localStorage
    let myBirdId = 'none';
    try {
      const user = JSON.parse(localStorage.getItem('ventpals_user') || '{}');
      myBirdId = user.birdId || 'none';
    } catch(e) {}

    const grid = document.getElementById('nestsGrid');

    BIRDS.forEach(bird => {
      const isMyBird = bird.id === myBirdId;
      const card = document.createElement('a');
      card.href = bird.page;
      card.className = 'nest-card block bg-white border-2 rounded-2xl p-4 hover:bg-purple-50 transition shadow-sm ' +
                       (isMyBird ? 'border-purple-400' : 'border-transparent');
      card.innerHTML = `
        <div class="flex items-center gap-4">
          <img src="assets/images/${bird.id}-nestling.png"
               alt="${bird.name}"
               class="h-16 w-16 object-contain flex-shrink-0"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="text-4xl flex-shrink-0 items-center justify-center hidden" style="width:64px;height:64px;">
            ${bird.emoji}
          </div>
          <div>
            <p class="font-bold text-purple-700 text-base">
              ${bird.name}'s Nest
              ${isMyBird ? '<span class="my-nest-badge" style="display:inline;">My Bird</span>' : ''}
            </p>
            <p class="text-xs text-gray-500 mt-0.5">${bird.trait}</p>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  </script>

</body>
</html>
